<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tokn Based</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
  const TWEAKS = /*EDITMODE-BEGIN*/{
    "accentHue": 285,
    "density": "comfortable",
    "showAurora": true
  }/*EDITMODE-END*/;
</script>
<style>
  :root {
    --hue: 285;
    --ink:        oklch(0.20 0.02 275);
    --ink-2:      oklch(0.36 0.02 275);
    --ink-3:      oklch(0.54 0.015 275);
    --ink-4:      oklch(0.68 0.012 275);
    --line:       oklch(0.93 0.006 275);
    --line-2:     oklch(0.88 0.008 275);
    --surface:    #ffffff;
    --surface-2:  oklch(0.987 0.004 280);
    --surface-3:  oklch(0.97 0.008 280);
    --accent:     oklch(0.54 0.22 var(--hue));
    --accent-2:   oklch(0.46 0.24 var(--hue));
    --accent-ink: oklch(0.30 0.18 var(--hue));
    --accent-wash:oklch(0.97 0.035 var(--hue));
    --accent-line:oklch(0.90 0.04 var(--hue));
    --ok:         oklch(0.62 0.15 150);
    --ok-wash:    oklch(0.96 0.04 150);
    --warn:       oklch(0.68 0.17 70);
    --warn-wash:  oklch(0.96 0.05 70);
    --bad:        oklch(0.56 0.20 25);
    --bad-wash:   oklch(0.96 0.04 25);

    --radius-sm: 6px;
    --radius:    10px;
    --radius-lg: 14px;
    --shadow-sm: 0 1px 0 oklch(0.88 0.008 275 / 0.6);
    --shadow:    0 1px 2px rgba(17, 20, 45, 0.04), 0 2px 12px rgba(17,20,45,0.04);
    --shadow-lg: 0 8px 32px rgba(17,20,45,0.08), 0 2px 6px rgba(17,20,45,0.04);

    --font: 'Geist', ui-sans-serif, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --mono: 'Geist Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    color: var(--ink);
    background: var(--surface-2);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01","cv11";
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea, select { font-family: inherit; color: inherit; }
  a { color: inherit; text-decoration: none; }

  /* Aurora hero wash (single moment of flair) */
  .aurora {
    position: absolute;
    inset: -40% -10% auto -10%;
    height: 520px;
    pointer-events: none;
    filter: blur(70px) saturate(1.1);
    opacity: 0.75;
    z-index: 0;
  }
  .aurora::before, .aurora::after {
    content: "";
    position: absolute;
    border-radius: 50%;
  }
  .aurora::before {
    left: 8%; top: 10%;
    width: 520px; height: 520px;
    background: radial-gradient(circle at 30% 30%, oklch(0.80 0.18 var(--hue)) 0%, transparent 60%);
  }
  .aurora::after {
    right: 4%; top: -5%;
    width: 620px; height: 620px;
    background:
      radial-gradient(circle at 70% 40%, oklch(0.80 0.16 calc(var(--hue) + 40)) 0%, transparent 55%),
      radial-gradient(circle at 40% 80%, oklch(0.82 0.14 calc(var(--hue) - 40)) 0%, transparent 55%);
  }

  /* App shell */
  .app { min-height: 100vh; display: flex; flex-direction: column; }

  /* Top bar */
  .topbar {
    position: sticky; top: 0; z-index: 40;
    background: color-mix(in oklab, var(--surface) 82%, transparent);
    backdrop-filter: saturate(1.3) blur(14px);
    -webkit-backdrop-filter: saturate(1.3) blur(14px);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner {
    max-width: 1240px; margin: 0 auto;
    padding: 0 24px; height: 60px;
    display: flex; align-items: center; gap: 24px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 600; letter-spacing: -0.02em; font-size: 15px;
  }
  .logo-mark {
    width: 26px; height: 26px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent) 0%, oklch(0.64 0.22 calc(var(--hue) + 30)) 100%);
    position: relative;
    box-shadow: 0 1px 2px rgba(17,20,45,0.2), inset 0 1px 0 rgba(255,255,255,0.25);
  }
  .logo-mark::after {
    content: ""; position: absolute; inset: 5px;
    border-radius: 3px;
    background:
      linear-gradient(white, white) padding-box,
      repeating-linear-gradient(90deg, white 0 2px, transparent 2px 4px);
    -webkit-mask: repeating-linear-gradient(90deg, #000 0 2px, transparent 2px 4px);
            mask: repeating-linear-gradient(90deg, #000 0 2px, transparent 2px 4px);
    background: white;
    opacity: 0.95;
  }
  .logo b { font-weight: 600; }
  .logo span { color: var(--ink-3); font-weight: 500; margin-left: 2px; }

  .nav { display: flex; gap: 2px; align-items: center; }
  .nav button {
    padding: 7px 12px; font-size: 13px; color: var(--ink-3);
    font-weight: 500; border-radius: 7px; letter-spacing: -0.005em;
  }
  .nav button:hover { color: var(--ink); background: var(--surface-2); }
  .nav button.active { color: var(--ink); background: var(--surface-2); }

  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }

  /* Role switcher */
  .role-switcher {
    display: inline-flex; background: var(--surface-2);
    border: 1px solid var(--line); border-radius: 10px; padding: 3px;
  }
  .role-switcher button {
    padding: 6px 12px; font-size: 12.5px; font-weight: 500;
    color: var(--ink-3); border-radius: 7px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .role-switcher button.active {
    background: var(--surface); color: var(--ink);
    box-shadow: 0 1px 2px rgba(17,20,45,0.06), 0 0 0 1px var(--line);
  }
  .role-switcher .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--ink-4);
  }
  .role-switcher button.active .dot { background: var(--accent); }

  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, oklch(0.82 0.08 var(--hue)), oklch(0.72 0.14 calc(var(--hue) + 40)));
    display: grid; place-items: center; color: white; font-size: 11px; font-weight: 600;
    border: 1px solid var(--line);
  }

  /* Main */
  .main { flex: 1; position: relative; }
  .container { max-width: 1240px; margin: 0 auto; padding: 40px 24px 96px; position: relative; z-index: 1; }

  /* Hero row */
  .hero {
    position: relative;
    padding: 48px 0 40px;
    margin-bottom: 28px;
  }
  .hero h1 {
    font-size: 40px; letter-spacing: -0.035em; font-weight: 600;
    line-height: 1.05;
  }
  .hero .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--accent-ink); font-weight: 500;
    background: var(--accent-wash); border: 1px solid var(--accent-line);
    padding: 4px 10px; border-radius: 999px; margin-bottom: 16px;
  }
  .hero .eyebrow .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 60%, transparent); }
    70%  { box-shadow: 0 0 0 8px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }
  .hero p.lead {
    margin-top: 12px; color: var(--ink-3); font-size: 16px; max-width: 560px; line-height: 1.55;
  }

  /* KPI strip */
  .kpis {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
    background: var(--surface);
    border: 1px solid var(--line); border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .kpi {
    padding: 20px 22px;
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 6px;
    position: relative;
  }
  .kpi:last-child { border-right: none; }
  .kpi .label {
    font-size: 11.5px; color: var(--ink-3); font-weight: 500;
    letter-spacing: 0.02em; text-transform: uppercase;
  }
  .kpi .value {
    font-size: 28px; font-weight: 600; letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums; line-height: 1.1;
  }
  .kpi .delta {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; font-weight: 500; color: var(--ok);
  }
  .kpi .delta.neg { color: var(--bad); }

  .spark {
    position: absolute; right: 14px; top: 14px;
    width: 80px; height: 28px; opacity: 0.9;
  }

  /* Section */
  section + section { margin-top: 36px; }
  .section-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 14px; gap: 16px;
  }
  .section-head h2 {
    font-size: 18px; font-weight: 600; letter-spacing: -0.015em;
  }
  .section-head .sub { font-size: 13px; color: var(--ink-3); margin-top: 2px; }

  /* Primary button */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 14px; border-radius: 8px;
    font-size: 13.5px; font-weight: 500; letter-spacing: -0.005em;
    border: 1px solid transparent; transition: all 0.15s;
    white-space: nowrap;
  }
  .btn.primary {
    background: var(--accent); color: white;
    box-shadow: 0 1px 0 rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.18), 0 1px 2px oklch(0.40 0.18 var(--hue) / 0.35);
  }
  .btn.primary:hover { background: var(--accent-2); }
  .btn.ghost {
    background: var(--surface); color: var(--ink);
    border-color: var(--line-2);
    box-shadow: var(--shadow-sm);
  }
  .btn.ghost:hover { background: var(--surface-2); }
  .btn.subtle { color: var(--ink-3); }
  .btn.subtle:hover { color: var(--ink); background: var(--surface-2); }
  .btn.sm { padding: 6px 10px; font-size: 12.5px; }
  .btn.lg { padding: 12px 18px; font-size: 14.5px; border-radius: 10px; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
  }
  .card-header {
    padding: 18px 22px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .card-header h3 { font-size: 14.5px; font-weight: 600; letter-spacing: -0.01em; }
  .card-header .sub { font-size: 12.5px; color: var(--ink-3); margin-top: 2px; }

  /* Event list */
  .events-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;
  }
  @media (max-width: 960px) { .events-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 620px) { .events-grid { grid-template-columns: 1fr; } }

  .event-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    padding: 18px 20px 16px;
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column; gap: 14px;
  }
  .event-card:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-lg);
    border-color: var(--line-2);
  }
  .event-card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 18%, transparent), var(--shadow);
  }
  .event-card .row { display: flex; align-items: center; gap: 10px; }
  .event-card .date-chip {
    width: 52px; flex-shrink: 0;
    border: 1px solid var(--line);
    border-radius: 9px; overflow: hidden;
    text-align: center; background: var(--surface);
  }
  .event-card .date-chip .m {
    font-size: 9.5px; letter-spacing: 0.1em; color: white;
    text-transform: uppercase; font-weight: 600;
    background: var(--accent); padding: 3px 0;
  }
  .event-card .date-chip .d {
    font-size: 20px; font-weight: 600; padding: 4px 0 5px; letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .event-card .title {
    font-size: 15px; font-weight: 600; letter-spacing: -0.015em; line-height: 1.3;
  }
  .event-card .meta { font-size: 12.5px; color: var(--ink-3); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .event-card .meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-4); }

  .progress {
    height: 6px; border-radius: 99px; background: var(--surface-3);
    overflow: hidden; position: relative;
  }
  .progress > span {
    display: block; height: 100%; background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s cubic-bezier(.4,0,.2,1);
  }
  .event-card .sold {
    display: flex; align-items: center; justify-content: space-between;
    font-size: 12px; color: var(--ink-3); margin-bottom: 4px;
    font-variant-numeric: tabular-nums;
  }
  .event-card .sold b { color: var(--ink); font-weight: 600; }

  /* Chips */
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 999px;
    font-size: 11.5px; font-weight: 500; letter-spacing: -0.005em;
    border: 1px solid var(--line);
    background: var(--surface-2); color: var(--ink-3);
  }
  .chip .d { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-4); }
  .chip.ok { background: var(--ok-wash); color: oklch(0.38 0.12 150); border-color: oklch(0.86 0.08 150); }
  .chip.ok .d { background: var(--ok); }
  .chip.warn { background: var(--warn-wash); color: oklch(0.42 0.13 70); border-color: oklch(0.86 0.09 70); }
  .chip.warn .d { background: var(--warn); }
  .chip.bad { background: var(--bad-wash); color: oklch(0.38 0.14 25); border-color: oklch(0.86 0.10 25); }
  .chip.bad .d { background: var(--bad); }
  .chip.accent { background: var(--accent-wash); color: var(--accent-ink); border-color: var(--accent-line); }
  .chip.accent .d { background: var(--accent); }

  /* Detail layout */
  .detail-grid {
    display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 24px;
    align-items: flex-start;
  }
  @media (max-width: 920px) { .detail-grid { grid-template-columns: 1fr; } }

  /* Ticket table */
  .ticket-table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  .ticket-table thead th {
    text-align: left; padding: 10px 16px;
    font-size: 11.5px; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 500;
    background: var(--surface-2);
    border-bottom: 1px solid var(--line);
  }
  .ticket-table tbody td {
    padding: 14px 16px;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  .ticket-table tbody tr:last-child td { border-bottom: none; }
  .ticket-table tbody tr:hover { background: var(--surface-2); }
  .ticket-table td.mono { font-family: var(--mono); font-size: 12px; color: var(--ink-2); }
  .ticket-table .row-qr {
    width: 28px; height: 28px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 4px;
    display: inline-grid; place-items: center;
    color: var(--ink-3);
  }

  /* QR modal */
  .modal-backdrop {
    position: fixed; inset: 0; z-index: 100;
    background: color-mix(in oklab, var(--ink) 40%, transparent);
    backdrop-filter: blur(4px);
    display: grid; place-items: center;
    padding: 24px;
    animation: fadeIn 0.18s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .modal {
    background: var(--surface); border-radius: 16px; border: 1px solid var(--line);
    max-width: 420px; width: 100%; overflow: hidden;
    box-shadow: 0 24px 80px rgba(17,20,45,0.24), 0 2px 8px rgba(17,20,45,0.08);
    animation: slideUp 0.22s cubic-bezier(.2,.8,.2,1);
  }
  .modal-head { padding: 18px 22px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
  .modal-head h3 { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .modal-body { padding: 24px 22px; }
  .modal-foot { padding: 14px 22px; border-top: 1px solid var(--line); display: flex; gap: 8px; justify-content: flex-end; background: var(--surface-2); }

  .close-btn {
    width: 30px; height: 30px; border-radius: 8px; color: var(--ink-3);
    display: grid; place-items: center;
  }
  .close-btn:hover { background: var(--surface-2); color: var(--ink); }

  /* Form */
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .field label { font-size: 12.5px; font-weight: 500; color: var(--ink-2); }
  .field .hint { font-size: 11.5px; color: var(--ink-3); }
  .input, .textarea, .select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line-2);
    border-radius: 8px;
    font-size: 13.5px;
    background: var(--surface);
    transition: border-color 0.15s, box-shadow 0.15s;
    font-feature-settings: "ss01";
  }
  .input:focus, .textarea:focus, .select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent) 16%, transparent);
  }
  .textarea { resize: vertical; min-height: 72px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* Drawer for Create Event */
  .drawer-backdrop {
    position: fixed; inset: 0; z-index: 90;
    background: color-mix(in oklab, var(--ink) 35%, transparent);
    animation: fadeIn 0.15s ease-out;
  }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 91;
    width: 460px; max-width: 100vw;
    background: var(--surface);
    border-left: 1px solid var(--line);
    box-shadow: -20px 0 60px rgba(17,20,45,0.12);
    display: flex; flex-direction: column;
    animation: slideIn 0.24s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: none; } }
  .drawer-head { padding: 20px 24px; border-bottom: 1px solid var(--line); }
  .drawer-head h3 { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; }
  .drawer-head p { font-size: 13px; color: var(--ink-3); margin-top: 4px; }
  .drawer-body { padding: 24px; overflow-y: auto; flex: 1; }
  .drawer-foot { padding: 16px 24px; border-top: 1px solid var(--line); display: flex; gap: 10px; justify-content: flex-end; background: var(--surface-2); }

  /* Attendee mobile ticket (in phone frame) */
  .phone-frame {
    width: 380px; max-width: 100%;
    background: var(--ink); border-radius: 44px;
    padding: 12px;
    box-shadow: 0 24px 64px rgba(17,20,45,0.22), 0 2px 6px rgba(17,20,45,0.08);
    margin: 0 auto;
  }
  .phone-screen {
    background: white; border-radius: 32px; overflow: hidden;
    position: relative;
    aspect-ratio: 9/19.5;
    display: flex; flex-direction: column;
  }
  .phone-notch {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 26px; border-radius: 999px;
    background: var(--ink); z-index: 5;
  }
  .phone-status {
    padding: 18px 22px 6px; display: flex; justify-content: space-between;
    font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums;
  }

  /* Door scanner */
  .scanner-frame {
    aspect-ratio: 1; width: 100%;
    border-radius: 18px; position: relative; overflow: hidden;
    background: oklch(0.24 0.02 275);
  }
  .scanner-frame::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 50% 50%, transparent 40%, rgba(0,0,0,0.5) 100%),
      repeating-linear-gradient(45deg, oklch(0.28 0.02 275) 0 8px, oklch(0.22 0.02 275) 8px 16px);
    opacity: 0.9;
  }
  .scanner-frame .corners span {
    position: absolute; width: 30px; height: 30px;
    border: 3px solid white; border-radius: 6px;
  }
  .scanner-frame .corners .tl { top: 14%; left: 14%; border-right: none; border-bottom: none; }

/* ---------------- QR code placeholder (no external lib) ---------------- */
const QR = ({ data, size = 180, dark = "currentColor", light = "transparent" }) => {
  // Deterministic pseudo-random pattern based on string hash — looks like a QR, scales crisply.
  const cells = 29;
  const cellSize = size / cells;
  const grid = useMemo(() => {
    let seed = 0;
    for (let i = 0; i < data.length; i++) seed = (seed * 31 + data.charCodeAt(i)) >>> 0;
    const rand = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return (seed >>> 8) / 0xFFFFFF; };
    const g = [];
    for (let y = 0; y < cells; y++) {
      const r = [];
      for (let x = 0; x < cells; x++) r.push(rand() > 0.52 ? 1 : 0);
      g.push(r);
    }
    // Finder patterns (3 corners)
    const place = (ox, oy) => {
      for (let y = 0; y < 7; y++) for (let x = 0; x < 7; x++) {
        const edge = x === 0 || y === 0 || x === 6 || y === 6;
        const inner = x >= 2 && x <= 4 && y >= 2 && y <= 4;
        g[oy+y][ox+x] = (edge || inner) ? 1 : 0;
      }
      // clear area next to finder
      for (let i = 0; i < 8; i++) {
        if (oy + 7 < cells) g[oy+7][ox+i] = 0;
        if (ox + 7 < cells) g[oy+i] && (g[oy+i][ox+7] = 0);
      }
    };
    place(0,0); place(cells-7, 0); place(0, cells-7);
    // small alignment
    for (let y = 0; y < 5; y++) for (let x = 0; x < 5; x++) {
      const edge = x === 0 || y === 0 || x === 4 || y === 4;
      const inner = x === 2 && y === 2;
      g[cells-7 + y - 1][cells-7 + x - 1] = (edge || inner) ? 1 : 0;
    }
    return g;
  }, [data]);

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} shapeRendering="crispEdges">
      <rect width={size} height={size} fill={light} />
      {grid.map((row, y) => row.map((v, x) => v ? (
        <rect key={`${x}-${y}`} x={x*cellSize} y={y*cellSize} width={cellSize} height={cellSize} fill={dark} />
      ) : null))}
    </svg>
  );
};

  return (
    <svg width={width} height={height}>
      <polyline fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" points={points} />

  );

                    <div style={{ textAlign: "center", padding: 16 }}>
                      <div style={{
                        width: 72, height: 72, borderRadius: "50%",
                        background: "white", color: "var(--warn)",
                        display: "grid", placeItems: "center", margin: "0 auto 10px",
                      }}>
                        <Icon name="clock" size={36} strokeWidth={2.5}/>
                      </div>
                      <div style={{ fontSize: 17, fontWeight: 600 }}>Bereits eingelöst</div>
                      <div style={{ fontSize: 12.5, marginTop: 4, opacity: 0.88 }}>Dieses Ticket wurde schon gescannt.</div>
                    </div>
                  </div>
                )}
                {state === "invalid" && (
                  <div style={{
                    position: "absolute", inset: 0, display: "grid", placeItems: "center",
                    background: "oklch(0.42 0.18 25)", color: "white", animation: "fadeIn 0.2s"
                  }}>
                    <div style={{ textAlign: "center", padding: 16 }}>
                      <div style={{
                        width: 72, height: 72, borderRadius: "50%",
                        background: "white", color: "var(--bad)",
                        display: "grid", placeItems: "center", margin: "0 auto 10px",
                      }}>
                        <Icon name="x" size={40} strokeWidth={3}/>
                      </div>
                      <div style={{ fontSize: 17, fontWeight: 600 }}>Ungültig</div>
                      <div style={{ fontSize: 12.5, marginTop: 4, opacity: 0.88 }}>Kein passendes Ticket gefunden.</div>
                    </div>
                  </div>
                )}
              </div>
              <div style={{ textAlign: "center", color: "var(--ink-3)", fontSize: 12.5, marginTop: 10 }}>
                {state === "idle" && "QR-Code in den Rahmen halten"}
                {state === "scanning" && "Wird geprüft …"}
              </div>
            </div>

            {/* Demo buttons */}
            <div style={{ padding: "10px 22px 6px", display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 6 }}>
              <button className="btn ghost sm" onClick={()=>simulate("success")}>Gültig</button>
              <button className="btn ghost sm" onClick={()=>simulate("used")}>Eingelöst</button>
              <button className="btn ghost sm" onClick={()=>simulate("invalid")}>Ungültig</button>
            </div>

            {/* Log */}
            <div style={{ padding: "10px 22px 22px" }}>
              <div style={{ fontSize: 11.5, color: "var(--ink-3)", fontWeight: 500, letterSpacing: "0.04em", textTransform: "uppercase", marginBottom: 8 }}>
                Letzte Einlässe
              </div>
              <div style={{ display: "grid", gap: 8 }}>
                {log.map((l, i) => (
                  <div key={i} style={{ display: "grid", gridTemplateColumns: "24px 1fr auto", gap: 10, alignItems: "center", fontSize: 12.5 }}>
                    <div style={{
                      width: 22, height: 22, borderRadius: "50%",
                      background: l.status === "success" ? "var(--ok-wash)" : "var(--warn-wash)",
                      color: l.status === "success" ? "var(--ok)" : "var(--warn)",
                      display: "grid", placeItems: "center",
                    }}>
                      <Icon name={l.status === "success" ? "check" : "clock"} size={11} strokeWidth={2.5}/>
                    </div>
                    <div>
                      <span style={{ fontWeight: 500 }}>{l.guest}</span>
                      <span style={{ color: "var(--ink-3)", marginLeft: 6 }}>· #{l.serial}</span>
                    </div>
                    <div style={{ color: "var(--ink-3)", fontVariantNumeric: "tabular-nums" }}>{l.time}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------------- Top bar ---------------- */
function TopBar({ role, setRole, page, setPage }) {
  return (
    <div className="topbar">
      <div className="topbar-inner">
        <div className="logo">
          <span className="logo-mark"/>
          <b>Tokn</b><span>Based</span>
        </div>
        {role === "organizer" && (
          <div className="nav">
            <button className={page==="dashboard" || page==="detail" ? "active" : ""} onClick={()=>setPage("dashboard")}>Übersicht</button>
            <button>Veranstaltungen</button>
            <button>Tickets</button>
            <button>Einlass</button>
            <button>Einstellungen</button>
          </div>
        )}
        <div className="topbar-right">
          <div className="role-switcher" role="tablist" aria-label="Rolle">
            <button className={role==="organizer" ? "active" : ""} onClick={()=>{setRole("organizer"); setPage("dashboard");}}>
              <span className="dot"/> Organisator
            </button>
            <button className={role==="attendee" ? "active" : ""} onClick={()=>setRole("attendee")}>
              <span className="dot"/> Gast
            </button>
            <button className={role==="door" ? "active" : ""} onClick={()=>setRole("door")}>
              <span className="dot"/> Einlass
            </button>
          </div>
          {role === "organizer" && (
            <>
              <button className="btn subtle sm" style={{ padding: 6 }}><Icon name="bell" size={15}/></button>
              <div className="avatar">MS</div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---------------- Tweaks panel ---------------- */
function Tweaks({ visible, hue, setHue }) {
  const hues = [
    { h: 285, name: "Violett" },
    { h: 255, name: "Indigo" },
    { h: 200, name: "Ozean" },
    { h: 150, name: "Wald" },
    { h: 25,  name: "Terra" },
    { h: 340, name: "Beere" },
  ];
  return (
    <div className={"tweaks " + (visible ? "visible" : "")}>
      <h4>Tweaks</h4>
      <div className="row">
        <label style={{ marginBottom: 6 }}>Akzent-Farbe</label>
      </div>
      <div className="swatches" style={{ marginBottom: 14 }}>
        {hues.map(c => (
          <button key={c.h} title={c.name}
            className={"swatch " + (hue === c.h ? "active" : "")}
            onClick={()=>setHue(c.h)}
            style={{ background: `oklch(0.54 0.22 ${c.h})` }} />
        ))}
      </div>
      <div style={{ fontSize: 11, color: "var(--ink-3)", lineHeight: 1.4 }}>
        Probiere verschiedene Akzentfarben. Andere Tweaks erscheinen hier beim Arbeiten an Details.
      </div>
    </div>
  );
}

/* ---------------- App root ---------------- */
function App() {
  const [role, setRole] = useState(() => localStorage.getItem("tb_role") || "organizer");
  const [page, setPage] = useState(() => localStorage.getItem("tb_page") || "dashboard");
  const [events, setEvents] = useState(seedEvents);
  const [selectedEventId, setSelectedEventId] = useState(() => localStorage.getItem("tb_event") || null);
  const [showCreate, setShowCreate] = useState(false);
  const [ticketModal, setTicketModal] = useState(null);

  const [hue, setHue] = useState(TWEAKS.accentHue);
  const [tweaksVisible, setTweaksVisible] = useState(false);

  useEffect(() => { localStorage.setItem("tb_role", role); }, [role]);
  useEffect(() => { localStorage.setItem("tb_page", page); }, [page]);
  useEffect(() => { if (selectedEventId) localStorage.setItem("tb_event", selectedEventId); }, [selectedEventId]);
  useEffect(() => {
    document.documentElement.style.setProperty("--hue", hue);
  }, [hue]);

  // Tweaks host protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksVisible(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksVisible(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);
  useEffect(() => {
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { accentHue: hue } }, "*");
  }, [hue]);

  const openEvent = (id) => { setSelectedEventId(id); setPage("detail"); };
  const selectedEvent = events.find(e => e.id === selectedEventId);

  const createEvent = (form) => {
    const [y,m,d] = form.date.split("-").map(Number);
    const [hh,mm] = form.time.split(":").map(Number);
    const date = new Date(y, m-1, d, hh, mm);
    const newEv = {
      id: "evt_" + String(events.length + 1).padStart(3, "0"),
      title: form.title,
      venue: form.venue,
      city: form.city,
      date,
      totalTickets: Number(form.ticketCount),
      soldTickets: 0,
      checkedIn: 0,
      price: Number(form.price) || 0,
      status: "Entwurf",
      color: hue,
    };
    setEvents([newEv, ...events]);
  };

  return (
    <div className="app" data-screen-label={role === "organizer" ? (page === "dashboard" ? "01 Organizer Dashboard" : "02 Event Detail") : role === "attendee" ? "03 Attendee Ticket" : "04 Door Scanner"}>
      <TopBar role={role} setRole={setRole} page={page} setPage={setPage}/>
      <div className="main">
        {role === "organizer" && page === "dashboard" && (
          <OrganizerDashboard events={events} onOpenEvent={openEvent} onCreate={()=>setShowCreate(true)} />
        )}
        {role === "organizer" && page === "detail" && selectedEvent && (
          <EventDetail event={selectedEvent} onBack={()=>setPage("dashboard")} onOpenTicket={setTicketModal}/>
        )}
        {role === "organizer" && page === "detail" && !selectedEvent && (
          <div className="container"><div className="empty">Veranstaltung nicht gefunden.</div></div>
        )}
        {role === "attendee" && <AttendeeView events={events}/>}
        {role === "door" && <DoorView events={events}/>}
      </div>

      {showCreate && <CreateEventDrawer onClose={()=>setShowCreate(false)} onCreate={createEvent}/>}
      {ticketModal && selectedEvent && <TicketQrModal ticket={ticketModal} event={selectedEvent} onClose={()=>setTicketModal(null)}/>}

      <Tweaks visible={tweaksVisible} hue={hue} setHue={setHue}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
